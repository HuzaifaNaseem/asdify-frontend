<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/jpeg" href="logo.jpg" />
    <link rel="apple-touch-icon" href="logo.jpg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Asdify offers calm, structured autism spectrum screening support for families and clinicians—questionnaires, optional image-assisted review, and human-centered reporting."
    />
    <title>Asdify</title>
    <script>
      (function () {
        try {
          var k = 'asdify-theme'
          var t = localStorage.getItem(k)
          if (t !== 'light' && t !== 'dark') {
            t = 'light'
          }
          document.documentElement.setAttribute('data-theme', t)
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'light')
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
